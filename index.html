<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>BITS Pilani Grade Moderator</title>
    <style>
        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            padding-top: 10px;
            background-color: navy;
            color: white;
            text-align: center;
        }
        .btn-dark-orange {
            background-color: #cc7000;
            color: white;
        }
        .btn-dark-orange:hover {
            background-color: #a85c00;
            color: white;
        }
        .btn-dark-red {
    	    background-color: #8B0000;  /* dark red */
            color: white;
        }
        .btn-dark-red:hover {
            background-color: #6e0000;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-1"></div>
            <div class="col-sm-10">
                <img src="imgs/moderator_art_2.svg" class="mx-auto d-block" style="width:100%">
            </div>
            <div class="col-sm-1"></div>
        </div>

        <!-- Three buttons evenly spaced using Bootstrap grid -->
        <div class="row justify-content-center">
            <div class="col-sm-3 text-center" style="margin-bottom: 10px;">
                <button type="button" class="btn btn-primary btn-lg"
                    onclick="location.href='new_grade.html'" style="width:100%;">
                    New Grades
                </button>
            </div>
            <div class="col-sm-3 text-center" style="margin-bottom: 10px;">
                <button type="button" class="btn btn-dark-red btn-lg"
                    onclick="location.href='new_grade_updated.html'" style="width:100%;">
                    New Grade (Simpler - Recommended)
                </button>
            </div>
            <div class="col-sm-3 text-center" style="margin-bottom: 10px;">
                <button type="button" class="btn btn-success btn-lg"
                    onclick="location.href='view_grade.html'" style="width:100%;">
                    View Grades
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
    <p style="color:darkgrey;">
        New to the system? You may watch the
        <a href="https://youtu.be/-dX6KwiFTj4" target="_blank">YouTube tutorial</a> before proceeding.
        You may also refer the 
        <a href="help.html" target="_blank">Help Documentation</a>.
        <br>
        For any bug report or suggestions please mail to
        <a href="mailto:a.mukherjee@hyderabad.bits-pilani.ac.in">
            Aritra Mukherjee, Dept. of CSIS, Hyd Campus
        </a>
    </p>
    </div>
</body>
</html>s
